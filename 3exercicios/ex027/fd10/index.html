<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>align-content</title>
  <style>
    ::-webkit-scrollbar {
      width: 0px;
    }
    * {
      margin: 0px;
      padding: 0px;
      box-sizing: border-box;
    }
    body{
      h1{
        padding:10px;
        text-indent: 30px;
      }
      strong {
      color: #ff0000;
      }
    }
    .pai {      
      background-color: rgba(128, 255, 0, 0.532);

      display: flex;
      flex-flow: row wrap;
   
    }

    .filho{

      border: 1px solid black;
      background-color: darkorchid;
      padding: 5px;
      text-align: center;
      flex-basis: 150px;
 
    }
    
  </style>
</head>
<body>
  <h1>flexbox <strong>flex-basis</strong></h1>
  <main>
    
    <section class="pai">
      <div class="filho" style="background-color: brown;" >00000000000</div>
      <div class="filho" >1111111111111</div>
      <div class="filho" >222222222222222</div>
      <div class="filho" >3</div>
      <div class="filho" style="background-color: aqua;" >44444444444444444</div>
    </section>
  </main>
  
</body>
</html>
