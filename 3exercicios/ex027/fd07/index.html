<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>align-content</title>
  <style>
    * {
      margin: 0px;
      padding: 0px;
      box-sizing: border-box;
    }

    main {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .pai {      
      background-color: rgba(128, 255, 0, 0.532);
      display: flex;
      flex-flow: row wrap;
      align-items: center;
      align-content: center;

      height: 400px;
      
    }
    .filho{

      border: 1px solid black;
      background-color: darkorchid;
      padding: 40px;
      /*o & comercial usado para anihamento(Nesting), para usdar com id que esta na class class="filho" id="i0" com no exemploanterior*/

    &#i0 {
      order: 4;
    }
    &#i1 {
      order: 4;
    }
    &#i2 {
      order: -1;
    }
    &#i3 {
      order: -2;
    }
    &#i4 {
      order: 0;
    }
    &#i5 {
      order: 5;
    }
    &#i6{
      order: 3;
    }
    &#i7 {
      order: 2;
    }

    &#i8 {
      order: 9;
    }
    &#i9 {
      order: 6;
    }

   
    }
    
  </style>
</head>
<body>
  <main>
    <section class="pai">
      <div class="filho" style="background-color: brown;" id="i0">0</div>
      <div class="filho" id="i1">1</div>
      <div class="filho" id="i2">2</div>
      <div class="filho" id="i3">3</div>
      <div class="filho" id="i4">4</div>
      <div class="filho" id="i5">5</div>
      <div class="filho" id="i6">6</div>
      <div class="filho" id="i7">7</div>
      <div class="filho" id="i8">8</div>
      <div class="filho" style="background-color: aqua;" id="i9">9</div>
    </section>
  </main>
  
</body>
</html>
