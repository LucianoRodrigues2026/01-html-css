<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>align-content</title>
  <style>
    * {
      margin: 0px;
      padding: 0px;
      box-sizing: border-box;
    }

    main {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .pai {      
      background-color: rgba(128, 255, 0, 0.532);
      display: flex;
      flex-flow: row wrap;
      align-items: center;
      align-content: center;

      height: 400px;

  
      
      
    }
    .filho{

      border: 1px solid black;
      background-color: darkorchid;
      padding: 40px;
   
    }

  </style>
</head>
<body>
  <main>
    <section class="pai">
      <div class="filho" style="background-color: brown;">0</div>
      <div class="filho">1</div>
      <div class="filho">2</div>
      <div class="filho">3</div>
      <div class="filho">4</div>
      <div class="filho">5</div>
      <div class="filho">6</div>
      <div class="filho">7</div>
      <div class="filho">8</div>
      <div class="filho" style="background-color: aqua;">9</div>
    </section>
  </main>
  
</body>
</html>
