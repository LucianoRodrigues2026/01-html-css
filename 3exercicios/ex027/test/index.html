<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flexbox</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    ::-webkit-scrollbar{
      width: 0px;
    }
    body {
      width: 100vw;
      height: 100vh;
    }
    main {
      width: 100%;
      height: 100%;
      position: relative;
      margin: 5px;
      
    }
    .pai {
      position: absolute;
      top: 50%;
      left: 50%;
      display: flex;
      border: 3px solid rede;
      border-radius: 10px;
      box-shadow: 0px 0px 10px red;
      padding: 10px;
      margin: 10px; 
      height: 100px; 
      width: 80%;
      transform: translate(-50%, -50%);    

    }
    .filho {
      background-image: url('espaço.png');
      background-repeat: no-repeat;
      background-size: cover;
      flex:auto;
      width: 50px;
      height: 50px;
      border: 1px solid black;
      border-radius: 10px;
      padding: 10px;
      margin-right: 10px;
      margin: auto;

    }

  </style>
</head>
<body>
  <main class="pai">
    <div class="filho"></div>
    <div class="filho"></div>
    <div class="filho"></div>
    <div class="filho"></div>
    <div class="filho"></div>
    <div class="filho"></div>
  </main>
  
</body>
</html>
