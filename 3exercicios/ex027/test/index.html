<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flexbox</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    ::-webkit-scrollbar{
      width: 0px;
    }
   
    body {
      width: 100vw;
      height: 100vh;
      background-color: black;
     
    }
    main.pai {
      border: 5px solid rgb(255, 255, 255);
      
      background-image: linear-gradient(to bottom, #ff0000, rgb(229, 241, 0));
      background-color: rgb(0, 0, 0);
      display: flex;
      flex-flow: row wrap;
      justify-content: center;
      align-items: center;

      padding: 10px;

      height: 150px;
      position: absolute;
      top: 50vh;
      left: 50vw;
      transform: translate(-50%, -50%);
    }

    div.filho {      
      background-image: url('espaço.png');
      background-repeat: no-repeat;
      background-size: cover;
      color: #ff0000;
      
      width: 40px;
      height: 40px;
      
    }
    div#i1 {
        order: 0;
    }
    div#i2 {
      order: -1;
    }
    div#i3 {
      order: 6;
    }
    div#i4{
      order: -2;
    }
    div#i5 {
      order: 5;
    }
    div#i6 {
      order: 4;
    }

  </style>
</head>
<body>
  <main class="pai">
    <div class="filho" id="i1">1</div>
    <div class="filho" id="i2">2</div>
    <div class="filho" id="i3">3</div>
    <div class="filho" id="i4">4</div>
    <div class="filho" id="i5">5</div>
    <div class="filho" id="i6">6</div>
  </main>
  
</body>
</html>
