<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flexbox</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    ::-webkit-scrollbar{
      width: 0px;
    }
   
    body {
      width: 100%;
      height: 100%;
      background-color: black;
     
    }
    main.pai {
      border: 5px dotted rgb(255, 255, 255);
      border-radius: 70px 0px 70px 0px;
      background-image: linear-gradient(to bottom, #ff0000, rgb(229, 241, 0));
      background-color: rgb(0, 0, 0);
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;

      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .filho {      
      background-image: url('espaço.png');
      background-repeat: no-repeat;
      background-size: cover;
      
      width: 50px;
      height: 50px;
      border-radius: 10px;
      margin: 10px;
      
    

    }

  </style>
</head>
<body>
  <main class="pai">
    <div class="filho">1</div>
    <div class="filho">2</div>
    <div class="filho">3</div>
    <div class="filho">4</div>
    <div class="filho">5</div>
    <div class="filho">6</div>
  </main>
  
</body>
</html>
