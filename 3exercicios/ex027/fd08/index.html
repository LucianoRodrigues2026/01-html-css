<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>align-content</title>
  <style>
    * {
      margin: 0px;
      padding: 0px;
      box-sizing: border-box;
    }
    body{
      h1{
        padding:10px;
        text-indent: 30px;
      }
      strong {
      color: #ff0000;
    }
    }

    main {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      
      
    .pai {      
      background-color: rgba(128, 255, 0, 0.532);
      display: flex;
      flex-flow: row wrap;
      align-items: center;
      align-items: flex-start;
  

      height: 400px;
      
    }  
    }

    .filho{

      border: 1px solid black;
      background-color: darkorchid;
      padding: 40px;
      margin: 1px;
      /*o & comercial usado para anihamento(Nesting), para usdar com id que esta na class class="filho" id="i0" com no exemploanterior*/

    &#i0 {
      align-self: flex-end;
    }
    &#i1 {
      align-self: flex-start;
    }
    &#i2 {
      align-self: auto;

    }
    &#i3 {
      align-self: center;

    }
    &#i4 {
      align-self: stretch;
    }   
    }
    
  </style>
</head>
<body>
  <h1>flexbox <strong>aling-self</strong></h1>
  <main>
    
    <section class="pai">
      <div class="filho" style="background-color: brown;" id="i0">0</div>
      <div class="filho" id="i1">1</div>
      <div class="filho" id="i2">2</div>
      <div class="filho" id="i3">3</div>
      <div class="filho" style="background-color: aqua;" id="i4">4</div>
    </section>
  </main>
  
</body>
</html>
