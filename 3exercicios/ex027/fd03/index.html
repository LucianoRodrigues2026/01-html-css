<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    
    ::-webkit-scrollbar{
      width: 0;
    }
    
    strong {
      color: red;
    }
    div.conteiner{
      border-radius: 10px;
      background-color: lightcoral;
      display: flex;
      flex-flow:  wrap;
      padding: 10px;

    }
    div.items{
      background-color: chocolate;
      border-radius: 10px;
      padding: 10px;
      flex: auto;
  
    }
    #red{
      background-color: brown;
    }
    #blue {
      background-color: rgb(4, 152, 197);
    }

    
  </style>
</head>
<body>
  <h1>flex-flow <strong>Auto</strong> (row)</h1>
  <div class="conteiner">
    <div class="items"  id="red" >Exemplo de  A</div>
    <div class="items">Exemplo de B</div>
    <div class="items">Exemplo de C</div>
    <div class="items">Exemplo de D</div>
    <div class="items">Exemplo de E</div>
    <div class="items">Exemplo de F</div>
    <div class="items">Exemplo de G</div>
    <div class="items">Exemplo de H</div>
    <div class="items"  id="blue">Exemplo de I</div>
  </div>


  
</body>
</html>
