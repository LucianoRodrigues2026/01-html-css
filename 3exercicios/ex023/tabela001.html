<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabelas</title>
  <style>
    body {
      font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
    }
    table {
      text-align: center;
      height: 300px;
      width: 300px;
      border-collapse: collapse;
    }
    td {
      border: 1px solid #292929;
  
    }
    td.roxo{
        background-color: blueviolet;
    }
    td.red {
      background-color: red;
  
    }
    .red:hover {
      text-align: right;
      vertical-align: bottom;
      background-color: blue;
      border-radius: 50%;
    }

  </style>
</head>
<body>
  <h1>Minha primeira tabela</h1>
  <h2>1 sendo a linha, (ABC) sendo as colunas da tabela</h2>
  <table>
    <tr>
      <td class="roxo">1A</td><!--1 sendo a linha, (ABC) sendo as colunas da tabela-->
      <td class="red">1B</td>
      <td class="roxo">1C</td>
    </tr>

    <tr>
    <td class="red">2A</td><!--2 sendo a linha, (ABC) sendo as colunas da tabela-->
    <td class="roxo">2B</td>
    <td class="red">2C</td>
    </tr>
    <tr>
    <td class="roxo">3A</td><!--3 sendo a linha, (ABC) sendo as colunas da tabela-->
    <td class="red">3B</td>
    <td class="roxo">3C</td>
   </tr>

  </table>
  
</body>
</html>
