<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabela Mesclagen</title>
  <style>
    h1 {
      font-size: 7vw;
      font-variant: small-caps;
      color: #01016d00;
      background-image: linear-gradient(to top, #01016d, #24d0ff);
      background-clip: text;
    }
    table {
      text-align: center;
      width: 100px;
      height: 100px;
      border-collapse: collapse;
      td {
      border: 1px solid black;
     
      }
      td.cor {
        background-color: #24d0ff;
      }
    }

    
    
  </style>
</head>
<body>
  <h1>Mesclagen de Tabelas</h1>

  <table>
     <tr>
      <td rowspan="3" class="cor">1</td>
      <td>2</td>
      <td>3</td>
    </tr>
    <tr>
      <td colspan="2" class="cor">5</td>
    
    </tr>
    <tr>
      <td>8</td>
      <td>9</td>
  </table>
  <br>
  <br>
  <table>
    <tr>
      <td>1</td>
      <td colspan="2" class="cor">2</td>
      
    </tr>
    <tr>
      <td rowspan="2" class="cor">4</td>
      <td>5</td>
      <td>6</td>
    </tr>
    <tr>
      <td>8</td>
      <td>9</td>
    </tr>
  </table>
  <br>
  <br>
  <table>
    <th colspan="3">original</th>
    <tr>
      <td>1</td>
      <td>2</td>
      <td>3</td>
    </tr>
    <tr>
      <td>4</td>
      <td>5</td>
      <td>6</td>
    </tr>
    <tr>
      <td>7</td>
      <td>8</td>
      <td>9</td>
    </tr>
</table>
</body>
</html>
