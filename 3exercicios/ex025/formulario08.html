<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario 008</title>
</head>
<body>
  <form action="cadrasto.js" method="get">
    <p>
      <label for="volume">Volume:</label>
      <input type="range" name="Volume" id="volume" min="0" max="20" value="5" oninput=" vol.innerHTML = Number(volume.value)">
      <output id="vol">5</output>
    </p>
    <P>
      <input type="submit" value="ENVIAR" >
      <input type="reset" value="LIMPAR">
    </P>
  </form>

  
</body>
</html>
