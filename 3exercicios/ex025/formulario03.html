<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>formulario tel e e-mail</title>
</head>
<body>
  <h1>Teste de formulario</h1>
  <form action="cadrasto.js" method="GET" autocomplete="on">
    <fieldset
    style="width: 200px; border: 3px solid #c0060643; border-radius: 20px; box-shadow: 9px 6px 18px #f307073a;">
      <legend style="font-variant: small-caps;">Dados Pessoais</legend>
      <p>
        <label for="telefono">Telefoni:</label>
        <input type="tel" name="Telefoni" id="telefono" requires placeholder="(00) 00000-000" pattern="\(\d{2}\)\d{4,5}-\d{4}$" autocomplete="tel">
      </p>
      <p>
        <label for="email">E-mail:</label>
        <input type="email" name="E-mail" id="email" required placeholder="Email@.com" autocomplete="email">
      </p>
      <p>
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">
      </p>
    </fieldset>
  </form>
</body>
</html>
