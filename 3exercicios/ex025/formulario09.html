<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulário</title>
</head>
<body>
  <form action="cadrasto.js" method="post">
    <p>
      <label for="Ano">Ano de Nascimento:</label>
      <input type="number" name="ano" id="Ano" required min="1900" max="2025" oninput="idadecal()">
    </p>
    <label for="idade"> Sua idade no ano atual:</label>
    <output id="idade">0 </output>
    <p>
      <input type="submit" value="Enviar">
      <input type="reset" value="Limpar">
    </p>
  </form>
  <script>
    function idadecal() {
      let atual = new Date().getFullYear()
      idade.innerHTML = Number(atual) - Number(Ano.value);
    }
  </script>

</body>
</html>
