<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario02</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    
    }
    ::-webkit-scrollbar {
      width: 0px;
      height: 0px;
    }
    body {
      background-attachment: fixed;
      background-color: lightblue;
      font-variant: small-caps;
      position: relative;
    }
    #conteiner {
      position:absolute;
      left: 50vw;
      top: 0vh;
      transform: translate(-50%, 9%);

      background-color: #ffffff;

      border-radius: 10px;
      box-shadow: 0px 0px 10px #000000b8;
      max-width: 285px;  
      min-width: 200px;
      max-height: 537px;
      min-height: 537px;
      line-height: 30px;
    }


    #titulo {
      position: relative;
      top: -1px;

      background-image: url('imagens/fundo-escola.jpg');
      background-repeat: no-repeat;
      background-position: bottom center;
      background-size: cover;
      
      margin-left: 0px;
      margin-right: 0px;
      border-radius: 10px 10px 0px 0px;
      padding: 30px 20px 60px 117px;
    }
    h1 {
      border-radius: 10px;
      color: rgb(20, 11, 0);
      background-color: rgba(245, 245, 220, 0.466);
      font-weight: lighter;
      text-align: center;
      font-size: 2em;
    }
    footer p {
      font-weight: bold;
      position: relative;
      top: 50px;
     
     
      background-color: #B3EBF2;
      border-radius: 0px 0px 10px 10px;
      text-align: center ;

      padding-right: 10px;
      padding-left: 10px;
    
      height: 36px;
    
    }
    #envLinp {
      display: flex;
      justify-content:right;
      border: none;
      
    }
    #enviar:hover, #limpar:hover{
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
    }
    #enviar{
      padding: 10px;
      margin-top: 5px;
      width: 80px;
      background-color: #B3EBF2;
      border: none;
      margin-right: 4px;
    }
    #limpar {
      padding: 10px;
      margin-top: 5px;
      width: 80px;
      background-color: #B3EBF2;
      border: none;
    }
    section {
      position: relative;
      top: 20px;
      margin: 10px;
    }
    
  </style>
</head>
<body>
  <form action="cadrasto.js" method="get" autocomplete="on">
    <div id="conteiner">
      <div id="titulo">
        <h1>Formulario Avaliativo</h1>
      </div>
  
      <section>
        <div id="nome">
          <label for="Nome">Nome do aluno: </label>
          <input type="text" name="nome" id="Nome" required placeholder="Nome" minlength="4" maxlength="15" size="17">
        </div>
        <div id="Nota">
         <label for="nota">Nota:</label>
         <input type="number" name="Nota" id="nota" required placeholder="Nota" min="0" max="10" step="0.1">
        </div>
        <div>
          <label for="avaliacao">Avaliação:</label>
          <input type="number" name="avaliacao" id="avaliacao" required placeholder="1ª2ª3ª4ª Avaliação" min="1" max="4" size="6">
        </div>
        
        <div id="mes">
          <label for="Mes">Período letivo:</label>
          <input type="month" name="mes" id="Mes" value="2026-03" required>
        </div>
        <div id="Data">
          <label for="data">Data:</label>
          <input type="date" name="data" id="data" required virtualkeyboardpolicy="true" value="2026-03-10" >
        </div>
        <div id="hora">
          <label for="horario">Horário da Avaliacão:</label>
          <input type="time" name="hora" id="hora" required virtualkeyboardpolicy="true" value="00:00">
        </div>
        <div id="envLinp">
          <input type="submit" value="Enviar" id="enviar">
          <input type="reset" value="Limpar" id="limpar">
        </div>
      </section>

      <footer>
        <p>escola samariana ficticio</p>
      </footer>

    </div>
  </form>
  
</body>
</html>
