<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario 04</title>
</head>
<body>
  <h1 style="font-variant: small-caps;">Teste de formularios</h1>
  <form action="cadrasto.js" method="get" autocomplete="on">
    <fieldset>
      <legend style="font-variant: small-caps; font-weight: bolder;">Sexo</legend>
      <input type="radio" name="sexo" id="Masculino" value="M" checked>
      <label for="Masculino">Masculino:</label>
      <br>
      <input type="radio" name="sexo" id="Feminino" value="F">
      <label for="Feminino">Feminino:</label>
    </fieldset>
    <br>
    <fieldset>
      <legend style="font-variant: small-caps; font-weight: bolder;">Esportes</legend>
      <input type="checkbox" name="futbol" id="futb" checked>
      <label for="futb">Futebol</label>
      <br>
      <input type="checkbox" name="basibol" id="basib">
      <label for="basib">Basibol</label>
      <br>
      <input type="checkbox" name="basquete" id="basqu">
      <label for="basqu">basquete</label>
      <br>
      <input type="checkbox" name="fut-mesa" id="fut">
      <label for="fut">fut-mesa</label>
      <br>
      <input type="checkbox" name="volei" id="vol" checked>
      <label for="vol">volei</label>
      <br>
      <input type="checkbox" name="randbol" id="ran">
      <label for="ran">randbol</label>
      <br>
      <input type="checkbox" name="corrida" id="corr">
      <label for="corr">corrida</label>
      <br>
      <input type="checkbox" name="musculação" id="muscu">
      <label for="muscu">musculação</label>
      <br>
      <input type="checkbox" name="natação" id="nat">
      <label for="nat">natação</label>
      <br>
    </fieldset>
    <br>
    <input type="submit" value="Enviar">
    <input type="reset" value="Limpar">
  </form>

</body>
</html>
