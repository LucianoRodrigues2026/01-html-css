<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <title>Imagens</title>
</head>
<body>
  <h1>Desafio das imagens</h1>
  <p>Inserir imagens em HTML e muito simples, tanto no contúdo quanto, quanto lá em cima, com íconi de favicon </p>
  <picture>
    <source media="(max-width:300px )" srcset="github-pp.png">
     <source media="(max-width:500px )" srcset="github-p.png">
    <source media="(max-width:700px )" srcset="github-m.png">
    <img src="github-gg.png" alt="gitemoji guanabara">
  </picture>

  
</body>
</html>
