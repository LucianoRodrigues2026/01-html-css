<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desafio 13/2 com Tabelas</title>
  <style>
    h1 {
      font-variant: small-caps;
    }
    table {
      text-align: center;
      width: 300px;
      height: 300px;
    }
    td {
      border: 1px dotted #f90808;
    }
    td.borda {
      border: 1px solid black;
    }
  </style>
</head>
<body>
  <h1>Desafio de Mesclagen de Tabelas</h1>
  <table>
    <tr>
      <td colspan="4" class="borda">A</td>
      <td rowspan="4" class="borda">B</td>
    </tr>
    <tr>
      <td rowspan="4" class="borda">C</td>
      <td>D</td>
      <td>E</td>
      <td>F</td>
    </tr>
    <tr>
      <td>G</td>
      <td>H</td>
      <td>I</td>
    </tr>
    <tr>
      <td>J</td>
      <td>L</td>
      <td>M</td>
    </tr>
    <tr>
      <td colspan="4" class="borda">N</td>
    </tr>
  </table>

</body>
</html>
