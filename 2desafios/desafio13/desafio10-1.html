<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desafio 13/1</title>
  <style>
    h1 {
      font-variant: small-caps;
    }
    table {
      text-align: center;
      width: 300px;
      height: 250px;
    }
    td {
      border: 1px dotted black;
    }
    td.borda {
      border: 2px solid black;
    }
  </style>
</head>
<body>
  <h1>Desafio 13/1 com Tabelas</h1>
  <table>
    <tr>
      <td>1</td>
      <td>2</td>
      <td rowspan="2" class="borda">3</td>
      <td>4</td>
    </tr>
    
    <tr>
      <td>5</td>
      <td>6</td>
      <td>7</td>
    </tr>
    
    <tr>
      <td colspan="3" class="borda">8</td>
      <td>9</td>
    </tr>
    
    <tr>
      <td rowspan="2" class="borda">10</td>
      <td colspan="2" class="borda">11</td>
      <td>12</td>
      
    </tr>
    
    <tr>
      <td>13</td>
      <td>14</td>
      <td>15</td>
    </tr>

  </table>
  
</body>
</html>
