<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desafio 14</title>
  <style>
    table {
      text-align: justify;
      width: 500px;
      border-collapse: collapse;
    }
    caption {
      font-size: 1.5em;
      font-variant: small-caps;
    }
    thead th {
      color: white;
      text-align: center;
      background-color: #505050;
    }
    .rodape {
      color:rgb(255, 252, 252) ;
      background-color: #505050;
    }

    #rodape {
      color:rgb(5, 5, 5) ;
      background-color: #505050;
    }
    td, th {
      border: 1px solid black;
    }
    .num {
      text-align: right;
    }

  </style>
</head>
<body>
  <h1>Desafio 14 com tabelas</h1>

  <table>
    <caption>Notas do primeiro bimestre do ano de 2026</caption>
    <thead>
      <tr>
        <th rowspan="2" scope="col">Area</th>
        <th rowspan="2" scope="col">Diciplinas</th>
        <th colspan="2" scope="colgroup">Notas</th>
        <th rowspan="2" scope="col">Medias</th>
      </tr>
      <tr>
        <th scope="col">Nota 1</th>
        <th scope="col">Nota 2</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <th rowspan="4"  scope="rowgroup">Exatas</th>
        <td>Matematica</td>
        <td class="num">0,0</td>
        <td class="num">0,0</td>
        <td class="num">0,0</td>
      </tr>
      <tr>
        <td>Física</td>
        <td class="num">0,0</td>
        <td class="num">0,0</td>
        <td class="num">0,0</td>
      </tr>
      <tr>
        <td>Química</td>
        <td class="num">0,0</td>
        <td class="num">0,0</td>
        <td class="num">0,0</td>
      </tr>
      <tr>
        <td>Biologia</td>
        <td class="num">0,0</td>
        <td class="num">0,0</td>
        <td class="num">0,0</td>
      </tr>
      <tr>
        <th colspan="4" class="rodape" scope="row">Media de Exatas</th>
        <td class="num"  id="rodape">0,0</td>
      </tr>


      <tr>
        <th rowspan="2" scope="rowgroup">Humanas</th>
        <td>História</td>
        <td class="num">0,0</td>
        <td class="num">0,0</td>
        <td class="num">0,0</td>
      </tr>
      <tr>
        <td>Geografia</td>
        <td class="num">0,0</td>
        <td class="num">0,0</td>
        <td class="num">0,0</td>
      </tr>
      <tr>
        <th colspan="4" class="rodape" scope="row">Media de Humanas</th>
        <td class="num" id="rodape">0,0</td>
      </tr>


    </tbody>
  </table>

</body>
</html>
